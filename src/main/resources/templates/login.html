<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login · Resume Screening</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-1: #f8fafc;
            --bg-2: #eef4fb;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e5e7eb;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
            color: var(--text-main);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
        }

        .shell {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .card-glass {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-control,
        .form-control:focus {
            border-radius: 14px;
            box-shadow: none;
        }

        .btn-primary {
            border-radius: 999px;
            padding-inline: 1.35rem;
            font-weight: 700;
            background-color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }

        .hint {
            color: var(--text-muted);
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="card-glass p-4 p-md-5">
        <div class="text-center mb-3">
            <div class="display-6 text-primary mb-2"><i class="bi bi-file-earmark-person"></i></div>
            <h1 class="h3 fw-bold mb-1">Resume Screening System</h1>
            <p class="hint mb-0">Log in to your account</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger rounded-4 border-0">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success rounded-4 border-0">
            You have been logged out successfully.
        </div>
        <div th:if="${param.signup}" class="alert alert-success rounded-4 border-0">
            Recruiter account created. Please sign in.
        </div>

        <form th:action="@{/login}" method="post" class="mt-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input class="form-control form-control-lg" name="username" type="text" autocomplete="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input class="form-control form-control-lg" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Log in</button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/signup}" class="hint">Create recruiter account</a>
        </div>
    </div>
</div>
</body>
</html>
