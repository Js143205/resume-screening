<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title>Recruiter Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f4fbff;
            --bg-2: #edf3f8;
            --surface: rgba(255, 255, 255, 0.95);
            --text-main: #17324d;
            --text-muted: #62809b;
            --accent: #1f6feb;
            --shadow: 0 20px 50px rgba(32, 63, 95, 0.12);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(31, 111, 235, 0.12), transparent 28%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
            color: var(--text-main);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .page-shell {
            max-width: 1380px;
            margin: 0 auto;
            padding: 2.5rem 1rem 3rem;
        }

        .glass-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .hero-card,
        .panel-card,
        .metric-card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .panel-card:hover,
        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 58px rgba(32, 63, 95, 0.15);
        }

        .hero-card,
        .panel-card {
            padding: 1.75rem;
        }

        .metric-card {
            padding: 1.35rem;
            border-radius: 22px;
            background: #f8fbfe;
            border: 1px solid rgba(23, 50, 77, 0.06);
            height: 100%;
        }

        .section-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .metric-value {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
        }

        .table-shell {
            overflow: auto;
            border-radius: 18px;
            border: 1px solid rgba(23, 50, 77, 0.07);
        }

        .table thead th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            background: #f7fafc;
        }

        .table tbody tr {
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .table tbody tr:hover {
            background: rgba(31, 111, 235, 0.03);
        }

        .chart-card {
            padding: 1.35rem;
            border-radius: 22px;
            background: #f8fbfe;
            border: 1px solid rgba(23, 50, 77, 0.06);
            height: 100%;
        }

        .chart-wrap {
            position: relative;
            height: 300px;
        }

        .skill-row + .skill-row {
            margin-top: 1rem;
        }

        .skill-pill {
            display: inline-flex;
            align-items: center;
            padding: 0.3rem 0.7rem;
            border-radius: 999px;
            background: rgba(31, 111, 235, 0.09);
            color: var(--accent);
            font-size: 0.84rem;
            font-weight: 700;
        }

        .skill-bar {
            height: 10px;
            border-radius: 999px;
            background: rgba(23, 50, 77, 0.08);
            overflow: hidden;
        }

        .skill-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #1f6feb, #4bb1ff);
        }

        .skill-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            background: rgba(31, 111, 235, 0.1);
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            margin: 0 0.4rem 0.4rem 0;
        }
    </style>
</head>
<body>
<div class="page-shell">
    <div th:replace="~{fragments/navbar :: body}"></div>

    <section class="glass-card hero-card mb-4">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
            <div>
                <div class="section-label">Recruiter Overview</div>
                <h1 class="display-6 fw-bold mb-2">Resume Screening Dashboard</h1>
                <p class="mb-0 text-secondary">
                    Your personal analytics: resumes screened, jobs created, recent rankings, and skill matching trends.
                </p>
            </div>
        </div>
    </section>

    <th:block th:replace="~{fragments/analytics :: metrics}"></th:block>
    <th:block th:replace="~{fragments/analytics :: charts}"></th:block>
    <th:block th:replace="~{fragments/analytics :: recentResultsAndSkills}"></th:block>
</div>

<th:block th:replace="~{fragments/analytics :: detailsModal}"></th:block>
<th:block th:replace="~{fragments/analytics :: toastContainer}"></th:block>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments/analytics :: chartScripts}"></th:block>
<th:block th:with="resultApiBasePath='/recruiter/result'" th:replace="~{fragments/analytics :: actionScripts}"></th:block>
</body>
</html>
