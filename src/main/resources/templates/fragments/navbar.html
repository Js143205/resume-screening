<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg bg-white border rounded-4 shadow-sm px-3 px-lg-4 py-2 py-lg-3 mb-4">
    <style>
        .nav-actions {
            gap: 0.55rem;
        }

        .nav-identity {
            border-radius: 999px;
            border: 1px solid #dbe4ee;
            background: linear-gradient(180deg, #fbfdff, #f4f8fc);
            padding: 0.35rem 0.75rem;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-role-chip {
            border-radius: 999px;
            padding: 0.15rem 0.5rem;
            font-size: 0.68rem;
            letter-spacing: 0.04em;
            font-weight: 700;
            border: 1px solid #d3dde8;
            background: #f5f8fc;
            color: #34495e;
            text-transform: uppercase;
        }

        .nav-username {
            font-weight: 600;
            color: #1f2d3d;
        }

        .nav-btn {
            min-height: 40px;
            border-radius: 999px;
            padding: 0.42rem 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
        }
    </style>
    <div class="container-fluid p-0">
        <span class="navbar-brand fw-bold text-dark mb-0">Resume Screening</span>

        <div class="d-flex flex-wrap align-items-center ms-auto nav-actions">
            <span class="nav-identity"
                  sec:authorize="isAuthenticated()">
                <span class="nav-role-chip"
                      sec:authorize="hasRole('ADMIN')">ADMIN</span>
                <span class="nav-role-chip"
                      sec:authorize="hasRole('RECRUITER')">RECRUITER</span>
                <span class="nav-username" sec:authentication="name">user</span>
            </span>

            <div class="d-flex flex-wrap align-items-center nav-actions" sec:authorize="hasRole('RECRUITER')">
                <a class="btn nav-btn"
                   th:classappend="${activePage == 'home'} ? 'btn-primary text-white' : 'btn-light border'"
                   th:href="@{/}">
                    <i class="bi bi-file-earmark-arrow-up me-1"></i> Resume Ranking
                </a>
                <a class="btn nav-btn"
                   th:classappend="${activePage == 'recruiter'} ? 'btn-primary text-white' : 'btn-light border'"
                   th:href="@{/recruiter}">
                    <i class="bi bi-speedometer2 me-1"></i> Dashboard
                </a>
            </div>

            <div class="d-flex flex-wrap align-items-center nav-actions" sec:authorize="hasRole('ADMIN')">
                <a class="btn nav-btn"
                   th:classappend="${activePage == 'home'} ? 'btn-primary text-white' : 'btn-light border'"
                   th:href="@{/}">
                    <i class="bi bi-file-earmark-arrow-up me-1"></i> Resume Ranking
                </a>
                <a class="btn nav-btn"
                   th:classappend="${activePage == 'admin'} ? 'btn-primary text-white' : 'btn-light border'"
                   th:href="@{/admin}">
                    <i class="bi bi-shield-lock me-1"></i> Admin Dashboard
                </a>
            </div>

            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-secondary nav-btn" type="submit">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
