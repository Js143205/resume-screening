<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg bg-white border rounded-4 shadow-sm px-3 px-lg-4 py-2 py-lg-3 mb-4">
    <div class="container-fluid p-0">
        <span class="navbar-brand fw-bold text-dark mb-0">Resume Screening</span>

        <div class="d-flex flex-wrap row-gap-2 column-gap-2 align-items-center ms-auto">
            <span class="text-secondary small me-2" sec:authorize="isAuthenticated()">
                Logged in as:
                <span class="badge rounded-pill text-bg-light border fw-semibold" sec:authorize="hasRole('ADMIN')">ADMIN</span>
                <span class="badge rounded-pill text-bg-light border fw-semibold" sec:authorize="hasRole('RECRUITER')">RECRUITER</span>
                (<span class="fw-semibold" sec:authentication="name">user</span>)
            </span>

            <a class="btn btn-light border btn-sm rounded-pill px-3 fw-semibold"
               sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin}">
                Go to Admin Panel
            </a>
            <a class="btn btn-light border btn-sm rounded-pill px-3 fw-semibold"
               sec:authorize="hasRole('ADMIN')"
               th:href="@{/}">
                Switch to Recruiter View
            </a>
            <a class="btn btn-light border btn-sm rounded-pill px-3 fw-semibold"
               sec:authorize="hasRole('RECRUITER')"
               th:href="@{/}">
                Go to Dashboard
            </a>

            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-semibold" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
